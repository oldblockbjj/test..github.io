<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的網站</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #333;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background: #575757;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
      background: white;
    }

    .card {
      background: #fafafa;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<header>
  <h1>我的第一個網站 🚀</h1>
  <p>這個網站可以直接放到 GitHub Pages 上線！</p>
</header>

<nav>
  <a href="#home">首頁</a>
  <a href="#about">關於我</a>
  <a href="#contact">聯絡</a>
</nav>

<div class="container">

  <section id="home">
    <h2>🏠 首頁</h2>
    <div class="card">
      <p>歡迎來到我的網站！這是一個可以直接上線的範例。</p>
      <button onclick="showMessage()">點我</button>
    </div>
  </section>

  <section id="about">
    <h2>👤 關於我</h2>
    <div class="card">
      <p>這裡可以放你的介紹，例如：學生、工程師、設計師等等。</p>
    </div>
  </section>

  <section id="contact">
    <h2>📞 聯絡方式</h2>
    <div class="card">
      <p>Email：your@email.com</p>
    </div>
  </section>

</div>

<footer>
  <p>© 2026 我的網站</p>
</footer>

<script>
function showMessage() {
  alert("網站成功運作！🎉");
}
</script>

</body>
</html>
